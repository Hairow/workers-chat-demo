<!DOCTYPE html>
<!--
  THIS IS NOT THE INTERESTING FILE

  This is just some UI code. There's nothing interesting and unique in this file. The interesting
  thing about this demo is the server side, which is in chat.mjs.

  WARNING: This was written by a systems engineer, not a web developer. It's probably bad.
-->

<html>
  <head>
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<!--===================================================================================-->
<!-- Inline style to avoid an extra round trip before the page can render. -->
<style type="text/css">
:root {
  --bg:            #f5f5f7;
  --surface:       #ffffff;
  --border:        #e5e5ea;
  --text-primary:  #1d1d1f;
  --text-secondary:#86868b;
  --accent:        #0071e3;
  --accent-hover:  #0077ed;
  --danger:        #ff3b30;
  --radius:        12px;
  --shadow-sm:     0 1px 3px rgba(0,0,0,.04);
  --shadow-md:     0 4px 12px rgba(0,0,0,.08);
  --shadow-lg:     0 8px 30px rgba(0,0,0,.12);
  --transition:    0.2s cubic-bezier(.25,.1,.25,1);
}

* {
  box-sizing: border-box;
}

body {
  margin: 0;
  font-family: -apple-system, BlinkMacSystemFont, "SF Pro Text", "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
  background: var(--bg);
  color: var(--text-primary);
  -webkit-font-smoothing: antialiased;
}

/* ── Chat area ────────────────────────────────────────────── */
#chatlog {
  position: fixed;
  top: 0;
  bottom: 52px;
  left: 0;
  right: 220px;
  overflow-y: auto;
  padding: 16px 20px;
  overflow-wrap: break-word;
  scroll-behavior: smooth;
}
#chatlog span.username {
  font-weight: 600;
  color: var(--accent);
}
#chatlog p {
  margin: 0 0 6px;
  padding: 6px 12px;
  border-radius: 8px;
  line-height: 1.5;
  font-size: 14px;
  animation: msgIn 0.25s ease-out;
}
#chatlog p:has(span.username) {
  background: none;
}
#chatlog p:not(:has(span.username)) {
  color: var(--text-secondary);
  font-size: 13px;
  font-style: italic;
}

@keyframes msgIn {
  from { opacity: 0; transform: translateY(8px); }
  to   { opacity: 1; transform: translateY(0); }
}

#spacer {
  height: calc(100vh - 52px - 5em);
}

/* ── Roster (online users) ────────────────────────────────── */
#roster {
  position: fixed;
  right: 0;
  top: 0;
  bottom: 52px;
  width: 220px;
  padding: 16px;
  background: var(--surface);
  border-left: 1px solid var(--border);
  overflow-y: auto;
  font-weight: 500;
  font-size: 13px;
  color: var(--text-primary);
}
#roster::before {
  content: "在线用户";
  display: block;
  font-size: 11px;
  font-weight: 600;
  text-transform: uppercase;
  letter-spacing: 0.5px;
  color: var(--text-secondary);
  padding-bottom: 10px;
  border-bottom: 1px solid var(--border);
  margin-bottom: 10px;
}

#roster p {
  padding: 5px 8px;
  border-radius: 6px;
  margin: 2px 0;
  animation: msgIn 0.3s ease-out;
}

p {
  margin: 0;
}

::-webkit-scrollbar {
  width: 4px;
}
::-webkit-scrollbar-thumb {
  background: #c1c1c6;
  border-radius: 4px;
}

@media(max-width:600px) {
  #chatlog { right: 0; }

  /* Roster toggle button */
  #roster-toggle {
    display: flex;
    position: fixed;
    z-index: 4;
    top: 10px;
    right: 10px;
    height: 32px;
    padding: 0 12px;
    align-items: center;
    gap: 6px;
    font-size: 13px;
    font-family: inherit;
    font-weight: 500;
    color: var(--text-secondary);
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 16px;
    cursor: pointer;
    box-shadow: var(--shadow-sm);
    transition: background var(--transition);
  }
  #roster-toggle:hover { background: var(--bg); }
  #roster-toggle .dot {
    width: 8px; height: 8px;
    border-radius: 50%;
    background: #34c759;
  }

  /* Backdrop */
  #roster-backdrop {
    display: none;
    position: fixed;
    z-index: 5;
    inset: 0;
    background: rgba(0,0,0,.25);
  }
  body.roster-open #roster-backdrop { display: block; }

  /* Roster as slide-in panel */
  #roster {
    position: fixed;
    z-index: 6;
    top: 0;
    bottom: 0;
    right: 0;
    width: 240px;
    padding: 56px 16px 16px;
    background: var(--surface);
    border-left: 1px solid var(--border);
    box-shadow: var(--shadow-lg);
    overflow-y: auto;
    transform: translateX(100%);
    transition: transform 0.25s cubic-bezier(.4,0,.2,1);
  }
  body.roster-open #roster { transform: translateX(0); }

  #roster::after {
    content: "\u2715";
    position: absolute;
    top: 16px;
    right: 16px;
    width: 28px; height: 28px;
    line-height: 28px;
    text-align: center;
    font-size: 14px;
    color: var(--text-secondary);
    cursor: pointer;
    border-radius: 50%;
    transition: background var(--transition);
  }
  #roster::after:hover { background: var(--bg); }
}

@media(min-width:601px) {
  #roster-toggle,
  #roster-backdrop { display: none !important; }
}

/* ── Input bar ────────────────────────────────────────────── */
#chat-input {
  position: fixed;
  bottom: 0;
  left: 0;
  right: 0;
  width: 100%;
  height: 52px;
  padding: 8px 16px 8px 42px;
  font-size: 15px;
  font-family: inherit;
  color: var(--text-primary);
  background: var(--surface);
  border: none;
  border-top: 1px solid var(--border);
  outline: none;
  transition: box-shadow var(--transition), border-color var(--transition);
}
#chat-input:focus {
  box-shadow: 0 -1px 0 var(--accent);
  border-color: var(--accent);
}
#chat-input::placeholder {
  color: var(--text-secondary);
}

#chatroom::before {
  z-index: 1;
  display: flex;
  align-items: center;
  justify-content: center;
  content: ">";
  position: fixed;
  bottom: 0;
  left: 0;
  width: 42px;
  height: 52px;
  font-size: 18px;
  font-weight: 600;
  color: var(--accent);
  pointer-events: none;
}

/* ── Name chooser ─────────────────────────────────────────── */
#name-form {
  position: fixed;
  z-index: 3;
  inset: 0;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  background: var(--bg);
  backdrop-filter: blur(20px);
}

#name-input {
  width: 260px;
  height: 52px;
  padding: 0 16px;
  font-size: 20px;
  font-family: inherit;
  text-align: center;
  color: var(--text-primary);
  background: var(--surface);
  border: 2px solid var(--border);
  border-radius: var(--radius);
  outline: none;
  transition: border-color var(--transition), box-shadow var(--transition);
}
#name-input:focus {
  border-color: var(--accent);
  box-shadow: 0 0 0 4px rgba(0,113,227,.15);
}
#name-input::placeholder {
  color: var(--text-secondary);
}

#name-form p {
  margin-top: 20px;
  max-width: 360px;
  padding: 0 16px;
  text-align: center;
  font-size: 13px;
  color: var(--text-secondary);
  line-height: 1.6;
}
#name-form p a {
  color: var(--accent);
  text-decoration: none;
}
#name-form p a:hover {
  text-decoration: underline;
}

/* ── Room chooser ─────────────────────────────────────────── */
#room-form {
  position: fixed;
  z-index: 2;
  inset: 0;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  gap: 16px;
  background: var(--bg);
  text-align: center;
}
#room-form p {
  font-size: 16px;
  color: var(--text-primary);
  margin: 0;
}

#room-name {
  width: 260px;
  height: 48px;
  padding: 0 14px;
  font-size: 16px;
  font-family: inherit;
  color: var(--text-primary);
  background: var(--surface);
  border: 2px solid var(--border);
  border-radius: var(--radius);
  outline: none;
  transition: border-color var(--transition), box-shadow var(--transition);
}
#room-name:focus {
  border-color: var(--accent);
  box-shadow: 0 0 0 4px rgba(0,113,227,.15);
}
#room-name::placeholder {
  color: var(--text-secondary);
}

#room-form button {
  height: 48px;
  padding: 0 28px;
  font-size: 16px;
  font-family: inherit;
  font-weight: 500;
  color: #fff;
  background: var(--accent);
  border: none;
  border-radius: var(--radius);
  cursor: pointer;
  transition: background var(--transition), transform 0.1s ease;
}
#room-form button:hover {
  background: var(--accent-hover);
}
#room-form button:active {
  transform: scale(0.97);
}
#room-form button:disabled {
  opacity: 0.5;
  cursor: not-allowed;
}

#room-form > * + * {
  margin: 0;
}

#go-public {
  min-width: 80px;
}
#go-private {
  min-width: 260px;
}

@media(max-width:500px) {
  #name-input, #room-name { width: 220px; }
  #go-private { min-width: 220px; }
}

</style>

<!--===================================================================================-->
<!-- The actual HTML. There is not much of it. -->

  </head>
  <body>
    <form id="name-form" action="/fake-form-action">
      <input id="name-input" placeholder="your name">
      <p>This chat runs entirely on the edge, powered by<br>
        <a href="https://blog.cloudflare.com/introducing-workers-durable-objects" target="_blank">Cloudflare Workers Durable Objects</a></p>
    </form>
    <form id="room-form" action="/fake-form-action">
      <p>Enter a public room:</p>
      <input id="room-name" placeholder="room name"><button id="go-public">Go &raquo;</button>
      <p>OR</p>
      <button id="go-private">Create a Private Room &raquo;</button>
    </form>
    <form id="chatroom" action="/fake-form-action">
      <div id="chatlog">
        <div id="spacer"></div>
      </div>
      <button id="roster-toggle" type="button"><span class="dot"></span><span id="roster-count">0</span></button>
      <div id="roster-backdrop"></div>
      <div id="roster"></div>
      <input id="chat-input">
    </form>
  </body>

<!--===================================================================================-->
<!-- Client-side JavaScript code for the app. -->

<script type="text/javascript">
let currentWebSocket = null;

let nameForm = document.querySelector("#name-form");
let nameInput = document.querySelector("#name-input");
let roomForm = document.querySelector("#room-form");
let roomNameInput = document.querySelector("#room-name");
let goPublicButton = document.querySelector("#go-public");
let goPrivateButton = document.querySelector("#go-private");
let chatroom = document.querySelector("#chatroom");
let chatlog = document.querySelector("#chatlog");
let chatInput = document.querySelector("#chat-input");
let roster = document.querySelector("#roster");
let rosterToggle = document.querySelector("#roster-toggle");
let rosterBackdrop = document.querySelector("#roster-backdrop");
let rosterCount = document.querySelector("#roster-count");

// Is the chatlog scrolled to the bottom?
let isAtBottom = true;

let username;
let roomname;

let hostname = window.location.host;
if (hostname == "") {
  // Probably testing the HTML locally.
  hostname = "edge-chat-demo.cloudflareworkers.com";
}

function startNameChooser() {
  nameForm.addEventListener("submit", event => {
    event.preventDefault();
    username = nameInput.value;
    if (username.length > 0) {
      nameForm.remove();
      roomname = "helloworld";
      startChat();
    }
  });

  nameInput.addEventListener("input", event => {
    if (event.currentTarget.value.length > 32) {
      event.currentTarget.value = event.currentTarget.value.slice(0, 32);
    }
  });

  nameInput.focus();
}

function startRoomChooser() {
  nameForm.remove();

  if (document.location.hash.length > 1) {
    roomname = document.location.hash.slice(1);
    startChat();
    return;
  }

  roomForm.addEventListener("submit", event => {
    event.preventDefault();
    roomname = roomNameInput.value;
    if (roomname.length > 0) {
      startChat();
    }
  });

  roomNameInput.addEventListener("input", event => {
    if (event.currentTarget.value.length > 32) {
      event.currentTarget.value = event.currentTarget.value.slice(0, 32);
    }
  });

  goPublicButton.addEventListener("click", event => {
    roomname = roomNameInput.value;
    if (roomname.length > 0) {
      startChat();
    }
  });

  goPrivateButton.addEventListener("click", async event => {
    roomNameInput.disabled = true;
    goPublicButton.disabled = true;
    event.currentTarget.disabled = true;

    let response = await fetch("https://" + hostname + "/api/room", {method: "POST"});
    if (!response.ok) {
      alert("something went wrong");
      document.location.reload();
      return;
    }

    roomname = await response.text();
    startChat();
  });

  roomNameInput.focus();
}

function startChat() {
  roomForm.remove();

  // Normalize the room name a bit.
  roomname = roomname.replace(/[^a-zA-Z0-9_-]/g, "").replace(/_/g, "-").toLowerCase();

  if (roomname.length > 32 && !roomname.match(/^[0-9a-f]{64}$/)) {
    addChatMessage("ERROR", "Invalid room name.");
    return;
  }

  document.location.hash = "#" + roomname;

  chatInput.addEventListener("keydown", event => {
    if (event.keyCode == 38) {
      // up arrow
      chatlog.scrollBy(0, -50);
    } else if (event.keyCode == 40) {
      // down arrow
      chatlog.scrollBy(0, 50);
    } else if (event.keyCode == 33) {
      // page up
      chatlog.scrollBy(0, -chatlog.clientHeight + 50);
    } else if (event.keyCode == 34) {
      // page down
      chatlog.scrollBy(0, chatlog.clientHeight - 50);
    }
  });

  chatroom.addEventListener("submit", event => {
    event.preventDefault();

    if (currentWebSocket) {
      currentWebSocket.send(JSON.stringify({message: chatInput.value}));
      chatInput.value = "";

      // Force the scroll state to bottom so that when the server echoes the
      // message back, addChatMessage() will scroll to show it.
      isAtBottom = true;
    }
  });

  chatInput.addEventListener("input", event => {
    if (event.currentTarget.value.length > 256) {
      event.currentTarget.value = event.currentTarget.value.slice(0, 256);
    }
  });

  chatlog.addEventListener("scroll", event => {
    // Allow a 2px tolerance to handle sub-pixel rendering differences.
    isAtBottom = (chatlog.scrollTop + chatlog.clientHeight + 2) >= chatlog.scrollHeight;
  });

  chatInput.focus();
  document.body.addEventListener("click", event => {
    // If the user clicked somewhere in the window without selecting any text, focus the chat
    // input.
    if (window.getSelection().toString() == "") {
      chatInput.focus();
    }
  });

  // Mobile roster toggle ────────────────────────────────────────
  rosterToggle.addEventListener("click", () => {
    document.body.classList.toggle("roster-open");
  });
  rosterBackdrop.addEventListener("click", () => {
    document.body.classList.remove("roster-open");
  });
  // Also close via the X pseudo-element in roaster
  roster.addEventListener("click", event => {
    if (event.target === roster) {
      document.body.classList.remove("roster-open");
    }
  });

  // Detect mobile keyboard appearing and disappearing, and adjust the scroll as appropriate.
  if('visualViewport' in window) {
    window.visualViewport.addEventListener('resize', function(event) {
      if (isAtBottom) {
        chatlog.scrollBy(0, 1e8);
      }
    });
  }

  join();
}

let lastSeenTimestamp = 0;
let wroteWelcomeMessages = false;

function join() {
  // If we are running via wrangler dev, use ws:
  const wss = document.location.protocol === "http:" ? "ws://" : "wss://";
  let ws = new WebSocket(wss + hostname + "/api/room/" + roomname + "/websocket");
  let rejoined = false;
  let startTime = Date.now();

  let rejoin = async () => {
    if (!rejoined) {
      rejoined = true;
      currentWebSocket = null;

      // Clear the roster.
      while (roster.firstChild) {
        roster.removeChild(roster.firstChild);
      }
      updateRosterCount();

      // Don't try to reconnect too rapidly.
      let timeSinceLastJoin = Date.now() - startTime;
      if (timeSinceLastJoin < 10000) {
        // Less than 10 seconds elapsed since last join. Pause a bit.
        await new Promise(resolve => setTimeout(resolve, 10000 - timeSinceLastJoin));
      }

      // OK, reconnect now!
      join();
    }
  }

  ws.addEventListener("open", event => {
    currentWebSocket = ws;

    // Send user info message.
    ws.send(JSON.stringify({name: username}));
  });

function updateRosterCount() {
  // Count actual user <p> elements (exclude the ::before title)
  let count = roster.querySelectorAll("p").length;
  rosterCount.textContent = count;
}

// ...

  ws.addEventListener("message", event => {
    let data = JSON.parse(event.data);

    if (data.error) {
      addChatMessage(null, "* Error: " + data.error);
    } else if (data.joined) {
      let p = document.createElement("p");
      p.innerText = data.joined;
      roster.appendChild(p);
      updateRosterCount();
    } else if (data.quit) {
      for (let child of roster.childNodes) {
        if (child.innerText == data.quit) {
          roster.removeChild(child);
          break;
        }
      }
      updateRosterCount();
    } else if (data.ready) {
      // All pre-join messages have been delivered.
      if (!wroteWelcomeMessages) {
        wroteWelcomeMessages = true;
        addChatMessage(null,
            "* This is a demo app built with Cloudflare Workers Durable Objects. The source code " +
            "can be found at: https://github.com/cloudflare/workers-chat-demo");
        addChatMessage(null,
            "* WARNING: Participants in this chat are random people on the internet. " +
            "Names are not authenticated; anyone can pretend to be anyone. The people " +
            "you are chatting with are NOT Cloudflare employees. Chat history is saved.");
        if (roomname.length == 64) {
          addChatMessage(null,
              "* This is a private room. You can invite someone to the room by sending them the URL.");
        } else {
          addChatMessage(null,
              "* Welcome to #" + roomname + ". Say hi!");
        }
      }
    } else {
      // A regular chat message.
      if (data.timestamp > lastSeenTimestamp) {
        addChatMessage(data.name, data.message);
        lastSeenTimestamp = data.timestamp;
      }
    }
  });

  ws.addEventListener("close", event => {
    console.log("WebSocket closed, reconnecting:", event.code, event.reason);
    rejoin();
  });
  ws.addEventListener("error", event => {
    console.log("WebSocket error, reconnecting:", event);
    rejoin();
  });
}

function addChatMessage(name, text) {
  let p = document.createElement("p");
  if (name) {
    let tag = document.createElement("span");
    tag.className = "username";
    tag.innerText = name + ": ";
    p.appendChild(tag);
  }
  p.appendChild(document.createTextNode(text));

  chatlog.appendChild(p);

  // Always scroll to bottom when a new message arrives, using requestAnimationFrame
  // to ensure the DOM has been painted. Using scrollTop = scrollHeight is more
  // reliable than scrollBy() for keeping new messages visible.
  if (isAtBottom) {
    requestAnimationFrame(() => {
      chatlog.scrollTop = chatlog.scrollHeight;
    });
  }
}

startNameChooser();
</script>
<!--===================================================================================-->
</html>
